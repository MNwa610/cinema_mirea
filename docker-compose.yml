services:
  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    env_file:
      - ./server/.env
    environment:
      - NODE_ENV=production
      - PORT=5050
    expose:
      - "5050"
    restart: unless-stopped

  nginx:
    build:
      context: .
      dockerfile: ./docker/nginx/Dockerfile
    depends_on:
      - server
    ports:
      - "80:80"
    restart: unless-stopped
